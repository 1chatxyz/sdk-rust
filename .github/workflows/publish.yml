name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CRATE_NAME: onechat-sdk

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Read crate version
        id: version
        run: |
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [ -z "$VERSION" ]; then
            echo "failed to parse version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing candidate: ${CRATE_NAME}@${VERSION}"

      - name: Skip if version already on crates.io
        id: skip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://crates.io/api/v1/crates/${CRATE_NAME}/${VERSION}"
          CODE="$(curl -sS -o /tmp/crate.json -w '%{http_code}' -A 'onechat-sdk-publish/0.1' "$URL" || true)"
          if [ "$CODE" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already published — skipping cargo publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} not found on crates.io (HTTP ${CODE}) — will publish."
          fi

      - name: Publish to crates.io
        if: steps.skip.outputs.exists != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN secret is not set" >&2
            exit 1
          fi
          cargo publish --token "${CARGO_REGISTRY_TOKEN}"
