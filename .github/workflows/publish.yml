name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CRATE_NAME: onechat-sdk
  WASM_CLIENT_CRATE: onechat-tonic-web-wasm-client

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Read crate versions
        id: version
        run: |
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          WASM_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' vendor/tonic-web-wasm-client/Cargo.toml | head -n1)"
          if [ -z "$VERSION" ] || [ -z "$WASM_VERSION" ]; then
            echo "failed to parse versions" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "wasm_version=$WASM_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing candidates: ${WASM_CLIENT_CRATE}@${WASM_VERSION}, ${CRATE_NAME}@${VERSION}"

      - name: Publish wasm client fork if needed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN secret is not set" >&2
            exit 1
          fi
          VERSION="${{ steps.version.outputs.wasm_version }}"
          URL="https://crates.io/api/v1/crates/${WASM_CLIENT_CRATE}/${VERSION}"
          CODE="$(curl -sS -o /tmp/wasm-crate.json -w '%{http_code}' -A 'onechat-sdk-publish/0.1' "$URL" || true)"
          if [ "$CODE" = "200" ]; then
            echo "${WASM_CLIENT_CRATE}@${VERSION} already published — skip."
          else
            echo "Publishing ${WASM_CLIENT_CRATE}@${VERSION} (HTTP ${CODE})"
            cargo publish --token "${CARGO_REGISTRY_TOKEN}" --manifest-path vendor/tonic-web-wasm-client/Cargo.toml
          fi

      - name: Skip if onechat-sdk version already on crates.io
        id: skip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://crates.io/api/v1/crates/${CRATE_NAME}/${VERSION}"
          CODE="$(curl -sS -o /tmp/crate.json -w '%{http_code}' -A 'onechat-sdk-publish/0.1' "$URL" || true)"
          if [ "$CODE" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already published — skipping cargo publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} not found on crates.io (HTTP ${CODE}) — will publish."
          fi

      - name: Publish onechat-sdk to crates.io
        if: steps.skip.outputs.exists != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN secret is not set" >&2
            exit 1
          fi
          cargo publish --token "${CARGO_REGISTRY_TOKEN}"
