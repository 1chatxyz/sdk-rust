[package]
name = "onechat-tonic-web-wasm-client"
version = "0.1.0"
authors = ["Devashish Dixit <devashishdxt@gmail.com>"]
edition = "2024"
description = "tonic-web-wasm-client fork with wasm-streams 0.6 (Cloudflare Workers)"
license = "MIT OR Apache-2.0"
repository = "https://github.com/1chatxyz/sdk-rust"
readme = "README.md"
keywords = ["grpc", "grpc-web", "tonic", "wasm"]
categories = ["web-programming", "network-programming", "asynchronous"]

[lib]
name = "tonic_web_wasm_client"
path = "src/lib.rs"

[dependencies]
base64 = "0.22"
byteorder = "1"
bytes = "1"
futures-util = { version = "0.3", default-features = false }
http = "1"
http-body = "1"
http-body-util = "0.1"
httparse = "1"
js-sys = "0.3"
pin-project = "1"
thiserror = "2"
tonic = { version = "0.14", default-features = false }
tower-service = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
wasm-streams = "0.6"
web-sys = { version = "0.3", features = [
    "AbortController",
    "AbortSignal",
    "Headers",
    "ReadableStream",
    "ReferrerPolicy",
    "Request",
    "RequestCache",
    "RequestCredentials",
    "RequestInit",
    "RequestMode",
    "RequestRedirect",
    "Response",
    "ServiceWorkerGlobalScope",
] }
