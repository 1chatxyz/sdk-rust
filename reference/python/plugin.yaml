name: myconversation
label: MyConversation Staff Chat
kind: platform
version: 1.0.5
description: Staff Group Chat adapter for myconversation
requires_env:
  - name: MYCONVERSATION_GATEWAY_ENDPOINT
    description: gateway01 URL or in-cluster host:port
  - name: MYCONVERSATION_TENANT_ID
    description: Tenant id (x-tenant-id header)
  - name: MYCONVERSATION_TOKEN
    description: Bearer token for service user
    password: true
  - name: MYCONVERSATION_USER_ID
    description: Bot myid user id
  - name: MYCONVERSATION_USERNAME
    description: Bot display name for @mention text match
  - name: MYCONVERSATION_ALLOW_ALL_USERS
    description: Hermes gateway auth — allow all staff users (match win-insights groupPolicy open)
  - name: MYCONVERSATION_ALLOWED_USERS
    description: Hermes gateway auth — comma-separated myid user ids (alternative to ALLOW_ALL_USERS)
