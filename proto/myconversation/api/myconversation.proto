// ── Dashboard analytics (shared filter + section RPCs) ──

// "Khoảng thời gian" preset for the dashboard filter.
enum DashboardTimePreset {
  DASHBOARD_TIME_PRESET_UNSPECIFIED  = 0;  // treated as LAST_7_DAYS
  DASHBOARD_TIME_PRESET_TODAY        = 1;
  DASHBOARD_TIME_PRESET_LAST_7_DAYS  = 2;
  DASHBOARD_TIME_PRESET_LAST_30_DAYS = 3;
  DASHBOARD_TIME_PRESET_CUSTOM       = 4;  // requires from_time / to_time
  DASHBOARD_TIME_PRESET_1_SHIFT      = 5;  // requires from_time / to_time as one 12h shift in GMT+7
}

message DashboardTimeRange {
  DashboardTimePreset preset = 1 [(validate.rules).enum = { defined_only: true }];
  // Date range (client tự gửi from_time/to_time theo UTC)
  google.protobuf.Timestamp from_time = 6;
  google.protobuf.Timestamp to_time   = 7;
  // When preset == DASHBOARD_TIME_PRESET_1_SHIFT, client must pass one of:
  // - 10:00 -> 22:00 (same GMT+7 date) — shift 1
  // - 22:00 -> 10:00 (next GMT+7 date) — shift 2
  // Server validates this shape in GMT+7, then converts to UTC for DB queries.
}

// "Loại xử lý" filter dropdown.
enum DashboardProcessingType {
  DASHBOARD_PROCESSING_TYPE_UNSPECIFIED   = 0;  // Tất cả
  DASHBOARD_PROCESSING_TYPE_AI_ONLY       = 1;  // BOT replies present, no SALES replies
  DASHBOARD_PROCESSING_TYPE_HUMAN_ONLY    = 2;  // SALES replies present, no BOT replies
  DASHBOARD_PROCESSING_TYPE_AI_PLUS_HUMAN = 3;  // Both BOT and SALES replies present
}

// Shared request body for every GetDashboard* RPC. Clients build it once and fan out.
message DashboardFilter {
  DashboardTimeRange time_range = 1;
  // "Nguồn Khách Hàng": empty = all. PLATFORM_FACEBOOK = Facebook, PLATFORM_EXTERNAL = Webapp/partner.
  repeated model.v1.Platform platforms = 2 [(validate.rules).repeated = { max_items: 8,
                                                                          items: { enum: { defined_only: true } } }];
  // "Nhân viên CS": myid user ids; empty = all staff.
  repeated int64 cs_user_ids              = 3 [(validate.rules).repeated = { max_items: 100, unique: true,
                                                                             items: { int64: { gt: 0 } } }];
  DashboardProcessingType processing_type = 4 [(validate.rules).enum = { defined_only: true }];
}

