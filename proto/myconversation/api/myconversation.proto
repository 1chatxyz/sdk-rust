enum ChatGroupMemberChangeType {
  CHAT_GROUP_MEMBER_CHANGE_TYPE_UNSPECIFIED  = 0;
  CHAT_GROUP_MEMBER_CHANGE_TYPE_ADDED        = 1;
  CHAT_GROUP_MEMBER_CHANGE_TYPE_REMOVED      = 2;
  CHAT_GROUP_MEMBER_CHANGE_TYPE_LEFT         = 3;
  CHAT_GROUP_MEMBER_CHANGE_TYPE_JOINED       = 4;
  CHAT_GROUP_MEMBER_CHANGE_TYPE_ROLE_CHANGED = 5;
}

// Membership snapshot; replayed on reconnect via resume_after_event_id and ListChatGroupMessages.
message ChatGroupMemberChange {
  int64 group_id                        = 1;
  ChatGroupMemberChangeType change_type = 2;
  int64 user_id                         = 3;
  model.v1.ChatGroupRole role           = 4;
  // ChatGroupStreamEventLog.id for this mutation; FE keeps the event with the higher value.
  int64 event_id                     = 5 [(validate.rules).int64 = { gt: 0 }];
  int64 actor_user_id                = 6;
  google.protobuf.Timestamp event_at = 7;
}

// Group metadata snapshot; replayed on reconnect via resume_after_event_id and ListChatGroupMessages.
message ChatGroupMetaChange {
  int64 group_id      = 1;
  ChatGroupInfo group = 2;
  // ChatGroupStreamEventLog.id for this mutation; FE keeps the event with the higher value.
  int64 event_id                     = 3 [(validate.rules).int64 = { gt: 0 }];
  int64 actor_user_id                = 4;
  google.protobuf.Timestamp event_at = 5;
}

enum ChatGroupTopicChangeType {
  CHAT_GROUP_TOPIC_CHANGE_TYPE_UNSPECIFIED = 0;
  CHAT_GROUP_TOPIC_CHANGE_TYPE_CREATED     = 1;
  CHAT_GROUP_TOPIC_CHANGE_TYPE_UPDATED     = 2;
  CHAT_GROUP_TOPIC_CHANGE_TYPE_DELETED     = 3;
}

// Topic lifecycle snapshot; replayed on reconnect via resume_after_event_id and ListChatGroupMessages.
message ChatGroupTopicChange {
  int64 group_id                       = 1;
  ChatGroupTopicChangeType change_type = 2;
  ChatGroupTopicInfo topic             = 3;
  // ChatGroupStreamEventLog.id for this mutation; FE keeps the event with the higher value.
  int64 event_id                     = 4 [(validate.rules).int64 = { gt: 0 }];
  int64 actor_user_id                = 5;
  google.protobuf.Timestamp event_at = 6;
}

// Live-only read receipt when a member marks read (MarkChatGroupRead); not replayed on reconnect.
// Never emitted when the reader is an active anonymous member (same silent pattern as MEMBER_CHANGE).
message ChatGroupReadChange {
  int64 group_id             = 1;
  int64 topic_id             = 2;  // 0 = main channel; > 0 = topic thread
  int64 reader_user_id       = 3;
  int64 last_read_message_id = 4;
  int64 unread_count         = 5;  // reader unread after mark read (main or topic scope)
}

// Live-only received ACK for peers (receipt = xác nhận đã nhận tin); not replayed on reconnect.
// Never emitted when the receiver is an active anonymous member.
message ChatGroupReceivedChange {
  int64 group_id             = 1;
  int64 topic_id             = 2;  // 0 = main channel; > 0 = topic thread
  int64 receiver_user_id     = 3;
  repeated int64 message_ids = 4;
  int64 received_at_unix_ms  = 5;
}

// Live-only reaction snapshot when a member reacts/unreacts; not replayed on reconnect.
message ChatGroupReactionChange {
  int64 group_id                     = 1;
  int64 topic_id                     = 2;  // 0 = main channel; > 0 = topic thread
  int64 message_id                   = 3;
  repeated MessageReaction reactions = 4;
  // Auto-increment id of the reaction row inserted or removed in this mutation; FE keeps the event with the higher value.
  int64 last_reaction_id = 5 [(validate.rules).int64 = { gt: 0 }];
}

// Pin/unpin snapshot; replayed on reconnect via resume_after_event_id.
message ChatGroupPinnedChange {
  int64 group_id                      = 1;
  int64 topic_id                      = 2;  // 0 = main channel; > 0 = topic thread
  int64 message_id                    = 3;
  bool pinned                         = 4;
  int64 pinned_by_user_id             = 5;
  google.protobuf.Timestamp pinned_at = 6;
  // ChatGroupStreamEventLog.id for this mutation; FE keeps the event with the higher value.
  int64 event_id = 7 [(validate.rules).int64 = { gt: 0 }];
}

message ChatGroupStreamEvent {
  oneof item {
    ChatGroupStreamPing ping                = 1;
    ChatGroupMessageInfo message            = 2;
    ChatGroupMemberChange member_change     = 3;
    ChatGroupMetaChange meta_change         = 4;
    ChatGroupTypingIndicator typing         = 5;
    ChatGroupTopicChange topic_change       = 6;
    ChatGroupReadChange read_change         = 7;
    ChatGroupReceivedChange received_change = 8;
    ChatGroupReactionChange reaction_change = 9;
    ChatGroupPinnedChange pinned_change     = 10;
  }
}

