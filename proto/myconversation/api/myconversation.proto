  int64 message_thread_root_id = 4 [(validate.rules).int64 = { gte: 0 }];
}

// unread_count: main-channel unread when topic_id=0; per-topic unread when topic_id>0.
message MarkChatGroupReadReply {
  int64 unread_count = 1;
}

// Client ACK after fetching messages locally (idempotent per user + message).
message MarkChatGroupReceivedRequest {
  int64 group_id = 1 [(validate.rules).int64 = { gt: 0 }];
  // Omit or 0 = main channel; > 0 = topic thread.
  int64 topic_id             = 2 [(validate.rules).int64 = { gte: 0 }];
