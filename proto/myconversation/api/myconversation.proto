  int32 page_size                     = 2;
  bool has_older                      = 3;
  bool has_newer                      = 4;
}

message MarkDirectMessageReadRequest {
  int64 thread_id            = 1 [(validate.rules).int64 = { gt: 0 }];
  int64 last_read_message_id = 2 [(validate.rules).int64 = { gte: 0 }];
  // Omit or 0 = DM timeline cursor. > 0 = mark read inside that message reply thread.
  int64 message_thread_root_id = 3 [(validate.rules).int64 = { gte: 0 }];
}

message MarkDirectMessageReadReply {
  int64 unread_count = 1;
}

message MarkDirectMessageReceivedRequest {
  int64 thread_id            = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated int64 message_ids = 2 [(validate.rules).repeated = { min_items: 1, max_items: 200, unique: true,
                                                                items: { int64: { gt: 0 } } }];
}

message MarkDirectMessageReceivedReply {
  int64 accepted_count = 1;
}

message SetDirectMessageReactionRequest {
  int64 message_id = 1 [(validate.rules).int64 = { gt: 0 }];
  string emoji     = 2 [(validate.rules).string = { min_len: 1, max_len: 64 }];
  bool remove      = 3;
}

message SetDirectMessageReactionReply {
  repeated MessageReaction reactions = 1;
}

message SetDirectMessagePinnedRequest {
  int64 message_id = 1 [(validate.rules).int64 = { gt: 0 }];
  bool pinned      = 2;
  // Only honored when pinned=true; enqueue push to DM peer (not pinner). Ignored on unpin.
  bool notify = 3;
}

message SetDirectMessagePinnedReply {
  DirectMessageInfo message = 1;
}

message ListDirectMessagePinnedMessagesRequest {
  int64 thread_id = 1 [(validate.rules).int64 = { gt: 0 }];
  int32 page_size = 2;
  // Optional content search (pinned message body only). Empty = browse all pins in scope.
  string query = 3 [(validate.rules).string = { ignore_empty: true, max_len: 256 }];
  // Browse mode (query empty): exclusive upper bound on pin row id; omit for the newest page.
  int64 before_pin_id = 4 [(validate.rules).int64 = { gte: 0 }];
  // Search mode (query non-empty): 1-based page index.
  int32 page = 5;
}

message ListDirectMessagePinnedMessagesReply {
  repeated DirectMessageInfo messages = 1;
  int32 page_size                     = 2;
  bool has_next                       = 3;
}

message SearchDirectMessagesRequest {
  // 0 = all threads where caller is participant; > 0 = single thread after participant check.
  int64 thread_id                     = 1 [(validate.rules).int64 = { gte: 0 }];
  string query                        = 2 [(validate.rules).string = { min_len: 1, max_len: 256 }];
  int32 page_size                     = 3;
  int32 page                          = 4;
  SearchMessagesSort sort             = 5 [(validate.rules).enum = { defined_only: true }];
  int64 from_user_id                  = 6 [(validate.rules).int64 = { gte: 0 }];
  google.protobuf.Timestamp from_time = 7;
  google.protobuf.Timestamp to_time   = 8;
  // Omit or 0: search all messages (top-level and replies). >0: restrict to replies within that thread.
  int64 message_thread_root_id = 9 [(validate.rules).int64 = { gte: 0 }];
}

message SearchDirectMessageHit {
  DirectMessageInfo message      = 1;
  DirectMessageThreadInfo thread = 2;
}

message SearchDirectMessagesReply {
  repeated SearchDirectMessageHit hits = 1;
  int32 page_size                      = 2;
  int32 page                           = 3;
  bool has_next                        = 4;
}

// ── Staff direct message live stream ──

message SignalDirectMessageTypingRequest {
  int64 thread_id = 1 [(validate.rules).int64 = { gt: 0 }];
  bool typing     = 2;
}

message SignalDirectMessageTypingReply {}

message DirectMessageTypingIndicator {
  int64 thread_id = 1;
  int64 user_id   = 2;
  string username = 3;
  bool typing     = 4;
}

message StreamDirectMessagesRequest {
  int64 resume_after_message_id = 1;
  int64 resume_after_event_id   = 2;
}

message DirectMessageStreamPing {
  int64 server_time_unix_ms = 1;
}

// Live-only read receipt when a participant marks read; not replayed on reconnect.
message DirectMessageReadChange {
  int64 thread_id            = 1;
  int64 reader_user_id       = 2;
  int64 last_read_message_id = 3;
  int64 unread_count         = 4;
}

// Live-only received ACK for peer; not replayed on reconnect.
message DirectMessageReceivedChange {
  int64 thread_id            = 1;
  int64 receiver_user_id     = 2;
  repeated int64 message_ids = 3;
  int64 received_at_unix_ms  = 4;
}

// Live-only reaction snapshot when a participant reacts/unreacts; not replayed on reconnect.
message DirectMessageReactionChange {
  int64 thread_id                    = 1;
  int64 message_id                   = 2;
  repeated MessageReaction reactions = 3;
  // Auto-increment id of the reaction row inserted or removed in this mutation; FE keeps the event with the higher value.
  int64 last_reaction_id = 4 [(validate.rules).int64 = { gt: 0 }];
}

// Pin/unpin snapshot; replayed on reconnect via resume_after_event_id.
message DirectMessagePinnedChange {
  int64 thread_id                     = 1;
  int64 message_id                    = 2;
  bool pinned                         = 3;
  int64 pinned_by_user_id             = 4;
  google.protobuf.Timestamp pinned_at = 5;
  // DirectMessageStreamEventLog.id for this mutation; FE keeps the event with the higher value.
  int64 event_id = 6 [(validate.rules).int64 = { gt: 0 }];
}

message DirectMessageStreamEvent {
  oneof item {
    DirectMessageStreamPing ping                = 1;
    DirectMessageInfo message                   = 2;
    DirectMessageTypingIndicator typing         = 3;
    DirectMessageReadChange read_change         = 4;
    DirectMessageReceivedChange received_change = 5;
    DirectMessageReactionChange reaction_change = 6;
    DirectMessagePinnedChange pinned_change     = 7;
  }
}

// ── Push notifications ──

enum PushPlatform {
  PUSH_PLATFORM_UNSPECIFIED = 0;
  PUSH_PLATFORM_ANDROID     = 1;
  PUSH_PLATFORM_IOS         = 2;
  PUSH_PLATFORM_WEB_CHROME  = 3;
  PUSH_PLATFORM_WEB_FIREFOX = 4;
}

message PushDevice {
  int64 id                             = 1;
  PushPlatform platform                = 2;
  string token                         = 3;
  string app_version                   = 4;
  string locale                        = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  // Stable per-install id from the mobile client; empty for web registrations.
  string client_device_id = 8;
}

message NotificationPreferences {
  bool customer_new_conversation = 1;
  bool customer_messages         = 2;
  bool group_messages            = 3;
  bool group_mentions            = 4;
  bool group_membership          = 5;
  bool direct_messages           = 6;
  bool group_reactions           = 7;
  bool direct_message_reactions  = 8;
}

message RegisterPushDeviceRequest {
  PushPlatform platform = 1 [(validate.rules).enum = { defined_only: true,
                                                       not_in: [ 0 ] }];
  // Plain FCM/APNs registration token (ANDROID, IOS, WEB_CHROME via Firebase getToken),
  // or JSON.stringify(PushSubscription) for WEB_CHROME / WEB_FIREFOX native Web Push.
  string token       = 2 [(validate.rules).string = { min_len: 1, max_len: 8192 }];
  string app_version = 3 [(validate.rules).string = { ignore_empty: true, max_len: 64 }];
  string locale      = 4 [(validate.rules).string = { ignore_empty: true, max_len: 16 }];
  // Required for ANDROID / IOS: stable id generated once per app install (Keychain / Keystore).
  // Ignored for web platforms (subscription supersede is per browser platform).
  string client_device_id = 5 [(validate.rules).string = { ignore_empty: true, max_len: 128 }];
}

message RegisterPushDeviceReply {
  PushDevice device = 1;
}

message UnregisterPushDeviceRequest {
  oneof key {
    int64 device_id = 1 [(validate.rules).int64 = { gt: 0 }];
    string token    = 2 [(validate.rules).string = { min_len: 1, max_len: 8192 }];
  }
}

message UnregisterPushDeviceReply {}

message GetNotificationPreferencesRequest {}

message GetNotificationPreferencesReply {
  NotificationPreferences preferences = 1;
}

message UpdateNotificationPreferencesRequest {
  repeated Change changes = 1 [(validate.rules).repeated = { min_items: 1, max_items: 8 }];

  message Change {
    oneof field {
      bool customer_new_conversation = 1;
      bool customer_messages         = 2;
      bool group_messages            = 3;
      bool group_mentions            = 4;
      bool group_membership          = 5;
      bool direct_messages           = 6;
      bool group_reactions           = 7;
      bool direct_message_reactions  = 8;
    }
  }
}

message UpdateNotificationPreferencesReply {
  NotificationPreferences preferences = 1;
}

// ── Link preview ──

message LinkPreview {
  string url         = 1 [(validate.rules).string = { min_len: 1, max_len: 2048, uri: true }];
  string title       = 2 [(validate.rules).string = { ignore_empty: true, max_len: 512 }];
  string description = 3 [(validate.rules).string = { ignore_empty: true, max_len: 512 }];
  string image_url   = 4 [(validate.rules).string = { ignore_empty: true, max_len: 2048, uri: true }];
  string site_name   = 5 [(validate.rules).string = { ignore_empty: true, max_len: 2048 }];
}

message PreviewLinkRequest {
  // url must be an absolute http or https URL. file://, javascript:, and other
  // schemes are rejected at the proto-validation layer before any fetch occurs.
  string url = 1 [(validate.rules).string = { min_len: 1, max_len: 2048, uri: true, pattern: "^https?://" }];
}

message PreviewLinkReply {
  LinkPreview preview      = 1;
  PreviewLinkResult result = 2;
}

enum PreviewLinkResult {
  PREVIEW_LINK_RESULT_UNSPECIFIED  = 0;
  PREVIEW_LINK_RESULT_OK           = 1;
  PREVIEW_LINK_RESULT_NO_METADATA  = 2;
  PREVIEW_LINK_RESULT_FETCH_FAILED = 3;
}

// ── Message media gallery ──

// Client-supplied metadata for one uploaded file attachment. The upload
// pipeline stores bare URLs only, so senders pass the original name/size
// captured from the file picker; entries with URLs absent from `files` are
// dropped server-side.
message FileMeta {
  string url  = 1 [(validate.rules).string = { min_len: 1, max_len: 2048 }];
  string name = 2 [(validate.rules).string = { ignore_empty: true, max_len: 512 }];
  int64 size  = 3 [(validate.rules).int64 = { gte: 0 }];
}

enum MessageMediaType {
  MESSAGE_MEDIA_TYPE_UNSPECIFIED = 0;
  MESSAGE_MEDIA_TYPE_MEDIA       = 1;
  MESSAGE_MEDIA_TYPE_FILE        = 2;
  MESSAGE_MEDIA_TYPE_LINK        = 3;
}

message ListMessageMediaRequest {
  // Exactly one target is required.
  oneof target {
    int64 group_id  = 1;  // chat group (main channel + topics)
    int64 thread_id = 2;  // staff direct message thread
  }
  MessageMediaType media_type = 3 [(validate.rules).enum = { in: [ 1, 2, 3 ] }];
  int32 page_size             = 4;
  // Exclusive upper bound (message id < cursor); omit for the newest page.
  int64 before_message_id = 5;
  // Chat group targets only: omit or 0 = whole group (main channel + all topics);
  // > 0 = restrict to that topic.
  int64 topic_id = 6 [(validate.rules).int64 = { gte: 0 }];
  // Chat group targets only: restrict to main-channel messages (topic_id = 0 rows). Needed because topic_id = 0 in this API means "whole group". Mutually exclusive with topic_id > 0.
  bool main_channel_only = 7;
}

message MessageMediaItem {
  int64 message_id            = 1;
  MessageMediaType media_type = 2;
  string url                  = 3;
  // True when a MEDIA item is a video (clients render a play badge / use <video>).
  bool is_video                        = 4;
  int64 sender_user_id                 = 5;
  google.protobuf.Timestamp created_at = 6;
  // FILE items only — original name/size captured at send time; empty for
  // files sent by clients that predate FileMeta support.
  string file_name = 7;
  int64 file_size  = 8;
  // LINK items only — snapshot of the stored link preview matching this URL
  // (empty when the message was sent without a preview) plus the message
  // text, so clients can render Telegram-style link cards without extra requests.
  string link_title       = 9;
  string link_description = 10;
  string link_image_url   = 11;
  string message_content  = 12;
}

message ListMessageMediaReply {
  // Newest message first; items within one message keep their stored order.
  repeated MessageMediaItem items = 1;
  // True when more items exist below min(returned.message_id).
  bool has_older = 2;
}

message GetMessageMediaCountsRequest {
  // Exactly one target is required.
  oneof target {
    int64 group_id  = 1;
    int64 thread_id = 2;
  }
  // Chat group targets only: omit or 0 = whole group; > 0 = restrict to that topic.
  int64 topic_id = 3 [(validate.rules).int64 = { gte: 0 }];
  // Chat group targets only: restrict to main-channel messages (topic_id = 0 rows). Mutually exclusive with topic_id > 0.
  bool main_channel_only = 4;
}

message GetMessageMediaCountsReply {
  // Counts are messages containing at least one item of the type (not item totals).
  int64 media_count = 1;
  int64 file_count  = 2;
  int64 link_count  = 3;
}

// ── Forward / shared message ──

message ChatGroupMessageRef {
  int64 group_id   = 1 [(validate.rules).int64 = { gt: 0 }];
  int64 topic_id   = 2 [(validate.rules).int64 = { gte: 0 }];
  int64 message_id = 3 [(validate.rules).int64 = { gt: 0 }];
}

message DirectMessageRef {
  int64 thread_id  = 1 [(validate.rules).int64 = { gt: 0 }];
  int64 message_id = 2 [(validate.rules).int64 = { gt: 0 }];
}

message CustomerMessageRef {
  int64 conversation_id = 1 [(validate.rules).int64 = { gt: 0 }];
  int64 message_id      = 2 [(validate.rules).int64 = { gt: 0 }];
}

message ChatGroupAudience {
  int64 group_id = 1 [(validate.rules).int64 = { gt: 0 }];
  // Optional; ACL uses group membership, not topic.
  int64 topic_id = 2 [(validate.rules).int64 = { gte: 0 }];
}

message ShareMessageRequest {
  oneof source {
    option (validate.required)  = true;
    ChatGroupMessageRef group   = 1;
    DirectMessageRef dm         = 2;
    CustomerMessageRef customer = 3;
  }
  oneof audience {
    option (validate.required)       = true;
    int64 user_id                    = 10 [(validate.rules).int64 = { gt: 0 }];
    ChatGroupAudience audience_group = 11;
  }
}

message ShareMessageReply {
  string hash = 1;
}

message GetSharedMessageRequest {
  string hash = 1 [(validate.rules).string = { min_len: 1, max_len: 64 }];
}

// Frozen forward-card payload (independent of source table).
message SharedMessageSnapshot {
  string content                              = 1;
  repeated string images                      = 2;
  repeated string videos                      = 3;
  repeated string files                       = 4;
  repeated string audios                      = 5;
  int64 sticker_id                            = 6;
  string sticker_url                          = 7;
  int64 sender_user_id                        = 8;
  string sender_username                      = 9;
  string source_kind                          = 10;  // GROUP | DM | CUSTOMER
  string source_name                          = 11;
  int64 source_message_id                     = 12;
  google.protobuf.Timestamp source_created_at = 13;
  // Location for FE "open original" (also on shared_messages row; echoed here for clients).
  int64 source_group_id        = 14;
  int64 source_topic_id        = 15;
  int64 source_thread_id       = 16;
  int64 source_conversation_id = 17;
  // Telegram GIFs (often mp4); kept separate from videos.
  repeated string gifs = 18;
  // Telegram voice notes (ogg/opus); distinct from generic audios.
  repeated string voices = 19;
  // Telegram sticker URLs (customer CS); group/DM still use sticker_id/url.
  repeated string stickers = 20;
}

message GetSharedMessageReply {
  SharedMessageSnapshot snapshot       = 1;
  int64 shared_by_user_id              = 2;
  google.protobuf.Timestamp created_at = 3;
}
