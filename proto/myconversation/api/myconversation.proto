syntax = "proto3";

package genjutsu.myconversation.v1;

option go_package = "gitlab.genjutsu.ai/marketplace/myconversation/api/v1/myconversation;myconversation";

import "myconversation/api/model.proto";
import "google/protobuf/timestamp.proto";
import "validate/validate.proto";
import "google/api/annotations.proto";

service MyConversation {
  rpc LinkFacebook(LinkFacebookRequest) returns (LinkFacebookReply);
  rpc ListFacebookAccounts(ListFacebookAccountsRequest) returns (ListFacebookAccountsReply);
  rpc ListPages(ListPagesRequest) returns (ListPagesReply);
  rpc UpdatePage(UpdatePageRequest) returns (UpdatePageReply);

  rpc ListConversations(ListConversationsRequest) returns (ListConversationsReply);
  // Platforms the tenant has configured for the helpdesk inbox (Facebook, partner, Telegram CS).
  // Admin and Agent only — FE uses this to show/hide per-platform conversation tabs.
  rpc ListPlatforms(ListPlatformsRequest) returns (ListPlatformsReply);
  rpc GetConversation(GetConversationRequest) returns (GetConversationReply);
  rpc UpdateConversation(UpdateConversationRequest) returns (UpdateConversationReply);

  rpc AddConversationLabels(AddConversationLabelsRequest) returns (AddConversationLabelsReply);
  rpc RemoveConversationLabels(RemoveConversationLabelsRequest) returns (RemoveConversationLabelsReply);

  rpc ListLabels(ListLabelsRequest) returns (ListLabelsReply);
  rpc CreateLabel(CreateLabelRequest) returns (CreateLabelReply);
  rpc UpdateLabel(UpdateLabelRequest) returns (UpdateLabelReply);
  rpc DeleteLabel(DeleteLabelRequest) returns (DeleteLabelReply);

  rpc GetConversationMessages(GetConversationMessagesRequest) returns (GetConversationMessagesReply);
  // Tenant-wide search: customer_name matches first, then message content (FULLTEXT/LIKE).
  // Paginate with page/page_size; use SearchMessagesReply.has_next (not len(hits) vs page_size).
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesReply);
  // Chronological chat timeline: messages, update events, and private notes (newest-first pages).
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesReply);
  // Server stream of helpdesk activity: conversation lines + AI reply suggestions (tenant-scoped).
  rpc StreamMessages(StreamMessagesRequest) returns (stream HelpdeskStreamEvent);
  rpc ListAiReplySuggestions(ListAiReplySuggestionsRequest) returns (ListAiReplySuggestionsReply);
  // Outbound sales reply on an external (partner) thread. When the conversation is unassigned
  // (user_id = 0), the authenticated salesperson (x-user-id) is stored as assignee on the first
  // successful send; already-assigned threads are unchanged.
  rpc SendMessage(SendMessageRequest) returns (SendMessageReply);
  // Edit or soft-delete a sales outbound message on an external (partner) thread.
  rpc UpdateMessage(UpdateMessageRequest) returns (UpdateMessageReply);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageReply);
  rpc Seen(SeenRequest) returns (SeenReply);
  // Mark messages unread: omit message_ids to unseen the whole conversation, or pass up to 200 ids.
  rpc Unseen(UnseenRequest) returns (UnseenReply);
  // Mark customer messages received (delivery receipt): pass 1–200 message ids (no conversation_id).
  // Monotonic — no un-received counterpart.
  rpc Received(ReceivedRequest) returns (ReceivedReply);
  // ListUnreceivedMessages returns customer inbound messages not yet marked received by staff,
  // across the tenant inbox (cursor pagination; no conversation_id).
  rpc ListUnreceivedMessages(ListUnreceivedMessagesRequest) returns (ListUnreceivedMessagesReply);

  rpc ListPrivateNotes(ListPrivateNotesRequest) returns (ListPrivateNotesReply);
  rpc CreatePrivateNote(CreatePrivateNoteRequest) returns (CreatePrivateNoteReply);
  rpc UpdatePrivateNote(UpdatePrivateNoteRequest) returns (UpdatePrivateNoteReply);
  rpc DeletePrivateNotes(DeletePrivateNotesRequest) returns (DeletePrivateNotesReply);
  rpc CreateScheduledMessage(CreateScheduledMessageRequest) returns (CreateScheduledMessageReply);
  rpc ListScheduledMessages(ListScheduledMessagesRequest) returns (ListScheduledMessagesReply);
  rpc GetScheduledMessage(GetScheduledMessageRequest) returns (GetScheduledMessageReply);
  rpc UpdateScheduledMessage(UpdateScheduledMessageRequest) returns (UpdateScheduledMessageReply);
  rpc DeleteScheduledMessage(DeleteScheduledMessageRequest) returns (DeleteScheduledMessageReply);

  rpc ListRecipients(ListRecipientsRequest) returns (ListRecipientsReply);
  rpc CreateRecipient(CreateRecipientRequest) returns (CreateRecipientReply);
  rpc UpdateRecipient(UpdateRecipientRequest) returns (UpdateRecipientReply);
  rpc DeleteRecipient(DeleteRecipientRequest) returns (DeleteRecipientReply);

  rpc CreateIntegration(CreateIntegrationRequest) returns (CreateIntegrationReply);
  rpc ListIntegrations(ListIntegrationsRequest) returns (ListIntegrationsReply);
  rpc UpdateIntegration(UpdateIntegrationRequest) returns (UpdateIntegrationReply);
  rpc RotateIntegrationSecret(RotateIntegrationSecretRequest) returns (RotateIntegrationSecretReply);
  rpc DeleteIntegration(DeleteIntegrationRequest) returns (DeleteIntegrationReply);

  // ── Telegram CS accounts (Business + Bot API connector; Admin CRUD; Admin+Agent list) ──
  rpc CreateTelegramCsAccount(CreateTelegramCsAccountRequest) returns (CreateTelegramCsAccountReply);
  rpc ListTelegramCsAccounts(ListTelegramCsAccountsRequest) returns (ListTelegramCsAccountsReply);
  rpc UpdateTelegramCsAccount(UpdateTelegramCsAccountRequest) returns (UpdateTelegramCsAccountReply);
  rpc DeleteTelegramCsAccount(DeleteTelegramCsAccountRequest) returns (DeleteTelegramCsAccountReply);

  rpc GetDashboard(GetDashboardRequest) returns (GetDashboardReply);

  // ── Dashboard analytics (per UI section). All RPCs share DashboardFilter; clients run them in parallel. ──
  rpc GetDashboardConversationQuality(DashboardFilter) returns (GetDashboardConversationQualityReply);
  rpc GetDashboardSentiment(DashboardFilter) returns (GetDashboardSentimentReply);
  rpc GetDashboardComplaints(DashboardFilter) returns (GetDashboardComplaintsReply);
  rpc GetDashboardTimingMetrics(DashboardFilter) returns (GetDashboardTimingMetricsReply);
  rpc GetDashboardTimingTrend(DashboardFilter) returns (GetDashboardTimingTrendReply);
  rpc GetDashboardStaffRanking(DashboardFilter) returns (GetDashboardStaffRankingReply);
  rpc GetDashboardAiHumanAnalytics(DashboardFilter) returns (GetDashboardAiHumanAnalyticsReply);
  rpc GetDashboardPeakHours(DashboardFilter) returns (GetDashboardPeakHoursReply);
  rpc GetDashboardAiPerformance(DashboardFilter) returns (GetDashboardAiPerformanceReply);
  // Populates the "Nhân viên CS" dropdown (myid users for the tenant).
  rpc ListDashboardCsStaff(ListDashboardCsStaffRequest) returns (ListDashboardCsStaffReply);

  // ── QA evaluation (external threads; Auditors: GetConversationMessages for chat history) ──
  rpc GetQAEvaluationRubric(GetQAEvaluationRubricRequest) returns (GetQAEvaluationRubricReply);
  rpc ListQAEvaluationConversations(ListQAEvaluationConversationsRequest) returns (ListQAEvaluationConversationsReply);
  rpc GetQAEvaluation(GetQAEvaluationRequest) returns (GetQAEvaluationReply);
  rpc SubmitQAEvaluation(SubmitQAEvaluationRequest) returns (SubmitQAEvaluationReply);
  rpc GetQAEvaluationStaffRanking(QAEvaluationFilter) returns (GetQAEvaluationStaffRankingReply);
  rpc ListQAEvaluationCriticalErrors(QAEvaluationFilter) returns (ListQAEvaluationCriticalErrorsReply);

  // Loads the tenant's partner integration (Get user profile URL + HMAC auth) and returns
  // the partner user profile for the given external_id. (CRM ownership check deferred.)
  rpc GetCustomerProfile(GetCustomerProfileRequest) returns (GetCustomerProfileReply);

  // ── Staff group chat (tenant-scoped; separate from customer Conversation threads) ──
  rpc CreateChatGroup(CreateChatGroupRequest) returns (CreateChatGroupReply);
  rpc UpdateChatGroup(UpdateChatGroupRequest) returns (UpdateChatGroupReply);
  rpc DeleteChatGroup(DeleteChatGroupRequest) returns (DeleteChatGroupReply);
  rpc ListMyChatGroups(ListMyChatGroupsRequest) returns (ListMyChatGroupsReply);
  rpc GetChatGroup(GetChatGroupRequest) returns (GetChatGroupReply);
  rpc AddChatGroupMember(AddChatGroupMemberRequest) returns (AddChatGroupMemberReply);
  rpc RemoveChatGroupMember(RemoveChatGroupMemberRequest) returns (RemoveChatGroupMemberReply);
  rpc UpdateChatGroupMemberRole(UpdateChatGroupMemberRoleRequest) returns (UpdateChatGroupMemberRoleReply);
  // Update live membership role and/or anonymous flag. Does not rewrite historical
  // ChatGroupMessage.sender_anonymous snapshots. OWNER/ADMIN may be anonymous;
  // MEMBER+anonymous is rejected. Owner/admin may self-toggle anonymity at will.
  rpc UpdateChatGroupMember(UpdateChatGroupMemberRequest) returns (UpdateChatGroupMemberReply);
  rpc LeaveChatGroup(LeaveChatGroupRequest) returns (LeaveChatGroupReply);
  rpc ListChatGroupMembers(ListChatGroupMembersRequest) returns (ListChatGroupMembersReply);
  rpc JoinChatGroup(JoinChatGroupRequest) returns (JoinChatGroupReply);
  rpc CreateChatGroupTopic(CreateChatGroupTopicRequest) returns (CreateChatGroupTopicReply);
  rpc UpdateChatGroupTopic(UpdateChatGroupTopicRequest) returns (UpdateChatGroupTopicReply);
  rpc DeleteChatGroupTopic(DeleteChatGroupTopicRequest) returns (DeleteChatGroupTopicReply);
  rpc ListChatGroupTopics(ListChatGroupTopicsRequest) returns (ListChatGroupTopicsReply);
  rpc GetChatGroupTopic(GetChatGroupTopicRequest) returns (GetChatGroupTopicReply);
  rpc SendChatGroupMessage(SendChatGroupMessageRequest) returns (SendChatGroupMessageReply) {
    option (google.api.http) = {
      post: "/api/v1/myconversation/chat-group-messages/{group_id}"
      body: "*"
    };
  };
  // Only the original sender may edit or delete; admins cannot mutate another member's message.
  rpc UpdateChatGroupMessage(UpdateChatGroupMessageRequest) returns (UpdateChatGroupMessageReply);
  rpc DeleteChatGroupMessage(DeleteChatGroupMessageRequest) returns (DeleteChatGroupMessageReply);
  rpc ListChatGroupMessages(ListChatGroupMessagesRequest) returns (ListChatGroupMessagesReply);
  rpc MarkChatGroupReceived(MarkChatGroupReceivedRequest) returns (MarkChatGroupReceivedReply);
  rpc MarkChatGroupRead(MarkChatGroupReadRequest) returns (MarkChatGroupReadReply);
  // Add or remove the caller's emoji reaction on a group message (idempotent).
  rpc SetChatGroupMessageReaction(SetChatGroupMessageReactionRequest) returns (SetChatGroupMessageReactionReply);
  // Pin or unpin a group message in its topic scope (main channel when topic_id = 0).
  rpc SetChatGroupMessagePinned(SetChatGroupMessagePinnedRequest) returns (SetChatGroupMessagePinnedReply);
  // List pinned messages in a group topic; optional content search via query.
  rpc ListChatGroupPinnedMessages(ListChatGroupPinnedMessagesRequest) returns (ListChatGroupPinnedMessagesReply);
  rpc ListMyChatGroupMentions(ListMyChatGroupMentionsRequest) returns (ListMyChatGroupMentionsReply);
  rpc MarkChatGroupMentionRead(MarkChatGroupMentionReadRequest) returns (MarkChatGroupMentionReadReply);
  rpc SearchChatGroups(SearchChatGroupsRequest) returns (SearchChatGroupsReply);
  rpc SearchGroupMessages(SearchGroupMessagesRequest) returns (SearchGroupMessagesReply);
  // Server stream of staff group chat activity (messages + membership/meta changes; tenant-scoped).
  rpc StreamChatGroups(StreamChatGroupsRequest) returns (stream ChatGroupStreamEvent);
  rpc SignalChatGroupTyping(SignalChatGroupTypingRequest) returns (SignalChatGroupTypingReply);

  // ── Staff direct message (1:1; separate from ChatGroup and customer Conversation) ──
  rpc CreateOrGetDirectMessage(CreateOrGetDirectMessageRequest) returns (CreateOrGetDirectMessageReply);
  rpc ListMyDirectMessages(ListMyDirectMessagesRequest) returns (ListMyDirectMessagesReply);
  rpc GetDirectMessage(GetDirectMessageRequest) returns (GetDirectMessageReply);
  rpc SendDirectMessage(SendDirectMessageRequest) returns (SendDirectMessageReply) {
    option (google.api.http) = {
      post: "/api/v1/myconversation/direct-messages"
      body: "*"
    };
  }
  // Only the original sender may edit or delete.
  rpc UpdateDirectMessage(UpdateDirectMessageRequest) returns (UpdateDirectMessageReply);
  rpc DeleteDirectMessage(DeleteDirectMessageRequest) returns (DeleteDirectMessageReply);
  rpc ListDirectMessages(ListDirectMessagesRequest) returns (ListDirectMessagesReply);
  rpc MarkDirectMessageRead(MarkDirectMessageReadRequest) returns (MarkDirectMessageReadReply);
  rpc MarkDirectMessageReceived(MarkDirectMessageReceivedRequest) returns (MarkDirectMessageReceivedReply);
  // Add or remove the caller's emoji reaction on a direct message (idempotent).
  rpc SetDirectMessageReaction(SetDirectMessageReactionRequest) returns (SetDirectMessageReactionReply);
  // Pin or unpin a direct message in the thread scope.
  rpc SetDirectMessagePinned(SetDirectMessagePinnedRequest) returns (SetDirectMessagePinnedReply);
  // List pinned messages in a DM thread; optional content search via query.
  rpc ListDirectMessagePinnedMessages(ListDirectMessagePinnedMessagesRequest) returns (ListDirectMessagePinnedMessagesReply);
  rpc SearchDirectMessages(SearchDirectMessagesRequest) returns (SearchDirectMessagesReply);
  // Server stream of staff direct message activity (tenant-scoped; filtered to participant threads).
  rpc StreamDirectMessages(StreamDirectMessagesRequest) returns (stream DirectMessageStreamEvent);
  rpc SignalDirectMessageTyping(SignalDirectMessageTypingRequest) returns (SignalDirectMessageTypingReply);

  // ── Forward / shared message (ACL grant + snapshot) ──
  // Load source with sharer ACL, freeze snapshot into shared_messages; does not send.
  rpc ShareMessage(ShareMessageRequest) returns (ShareMessageReply);
  // Load snapshot if requester is in the grant audience (not source membership).
  rpc GetSharedMessage(GetSharedMessageRequest) returns (GetSharedMessageReply);

  // ── Push notifications (device registration + per-user preferences) ──
  // Upsert (tenant_id, user_id, platform, token) from authenticated context.
  rpc RegisterPushDevice(RegisterPushDeviceRequest) returns (RegisterPushDeviceReply);
  // Delete by device id or FCM / Web Push token.
  rpc UnregisterPushDevice(UnregisterPushDeviceRequest) returns (UnregisterPushDeviceReply);
  // Effective prefs for the caller; lazy-init role-based defaults when no row exists.
  rpc GetNotificationPreferences(GetNotificationPreferencesRequest) returns (GetNotificationPreferencesReply);
  // Partial update of preference bool flags.
  rpc UpdateNotificationPreferences(UpdateNotificationPreferencesRequest) returns (UpdateNotificationPreferencesReply);

  // ── Link preview ──
  // Fetch Open Graph / meta tags for a URL and return a structured preview; result is best-effort.
  rpc PreviewLink(PreviewLinkRequest) returns (PreviewLinkReply);

  // ── Message media gallery ──
  // Flat, newest-first list of media items of one type in a chat group or DM thread.
  rpc ListMessageMedia(ListMessageMediaRequest) returns (ListMessageMediaReply);
  // Per-type totals so clients can show only tabs that have content.
  rpc GetMessageMediaCounts(GetMessageMediaCountsRequest) returns (GetMessageMediaCountsReply);
}

message MetaPageInfo {
  int64 id                             = 1;
  string page_id                       = 2;
  string page_name                     = 3;
  string picture_url                   = 4;
  model.v1.Status status               = 5;
  model.v1.Mode mode                   = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message LinkFacebookRequest {
  string authorization_code = 1 [(validate.rules).string = { min_len: 1, max_len: 2048 }];
  string redirect_url       = 2 [(validate.rules).string = { min_len: 1, max_len: 2048 }];
}

message LinkFacebookReply {
  repeated MetaPageInfo pages = 1;
}

message MetaFacebookAccountInfo {
  int64 id                                   = 1;
  string facebook_user_id                    = 2;
  string display_name                        = 3;
  string picture_url                         = 4;
  google.protobuf.Timestamp token_expires_at = 5;
  google.protobuf.Timestamp created_at       = 6;
  google.protobuf.Timestamp updated_at       = 7;
}

message ListFacebookAccountsRequest {
  int32 page_size = 1;
  int32 page      = 2;
}

message ListFacebookAccountsReply {
  repeated MetaFacebookAccountInfo accounts = 1;
  int32 page_size                           = 2;
  int32 page                                = 3;
  int64 count                               = 4;
}

message ListPagesRequest {
  int32 page_size                   = 1;
  int32 page                        = 2;
  repeated model.v1.Status statuses = 3;
  repeated model.v1.Mode modes      = 4;
}

message ListPagesReply {
  repeated MetaPageInfo pages = 1;
  int32 page_size             = 2;
  int32 page                  = 3;
  int64 count                 = 4;
}

message UpdatePageRequest {
  int64 id                = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated Change changes = 2;

  message Change {
    oneof field {
      model.v1.Status status = 1;
      model.v1.Mode mode     = 2;
    }
  }
}

message UpdatePageReply {
}

message UpdateConversationRequest {
  int64 id                = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated Change changes = 2;

  message Change {
    oneof field {
      model.v1.Mode mode = 1;
      // Reassign thread to another myid salesperson (0 = unassigned). Any tenant member may set this.
      int64 user_id = 2 [(validate.rules).int64 = { gte: 0 }];
      // Help-desk state; any tenant member may update. Valid transitions are enforced server-side.
      model.v1.ConversationState state = 3;
    }
  }
}

message UpdateConversationReply {
}

message LabelInfo {
  // Denormalized catalog row id (same as LabelCatalogInfo.id) when the tag was copied from definitions; 0 for freeform-only. Not a foreign key at the SQL layer — stored only inside Conversation.labels JSON.
  int64 id           = 1;
  string title       = 2 [(validate.rules).string = { max_len: 128 }];
  string color       = 3 [(validate.rules).string = { ignore_empty: true, max_len: 32 }];
  string description = 4 [(validate.rules).string = { ignore_empty: true, max_len: 512 }];
  // Milliseconds since Unix epoch when this tagging was written on the conversation (used with cutoff_unix_ms on catalog delete).
  int64 applied_at_unix_ms = 5;
}

message AddConversationLabelsRequest {
  int64 conversation_id     = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated int64 ids        = 2 [(validate.rules).repeated = { max_items: 3,
                                                               items: { int64: { gt: 0 } } }];
  repeated LabelInfo labels = 3 [(validate.rules).repeated = { max_items: 3 }];
}

message AddConversationLabelsReply {
  repeated LabelInfo labels = 1;
}

message RemoveConversationLabelsRequest {
  int64 conversation_id  = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated string titles = 2 [(validate.rules).repeated = { min_items: 1, max_items: 50,
                                                            items: { string: { min_len: 1, max_len: 128 } } }];
}

message RemoveConversationLabelsReply {
  repeated LabelInfo labels = 1;
}

message LabelCatalogInfo {
  int64 id                             = 1;
  string title                         = 2 [(validate.rules).string = { min_len: 1, max_len: 128 }];
  string color                         = 3 [(validate.rules).string = { ignore_empty: true, max_len: 32 }];
  string description                   = 4 [(validate.rules).string = { ignore_empty: true, max_len: 512 }];
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message ListLabelsRequest {
  int32 page_size = 1;
  int32 page      = 2;
}

message ListLabelsReply {
  repeated LabelCatalogInfo labels = 1;
  int32 page_size                  = 2;
  int32 page                       = 3;
  int64 count                      = 4;
}

message CreateLabelRequest {
  string title       = 1 [(validate.rules).string = { min_len: 1, max_len: 128 }];
  string color       = 2 [(validate.rules).string = { ignore_empty: true, max_len: 32 }];
  string description = 3 [(validate.rules).string = { ignore_empty: true, max_len: 512 }];
}

message CreateLabelReply {
  LabelCatalogInfo label = 1;
}

message UpdateLabelRequest {
  int64 id                = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated Change changes = 2 [(validate.rules).repeated = { min_items: 1, max_items: 10 }];
  message Change {
    oneof field {
      string color       = 1 [(validate.rules).string = { max_len: 32 }];
      string description = 2 [(validate.rules).string = { max_len: 512 }];
      // Normalized to lowercase on write; identity for conversation tag sync / filters.
      string title = 3 [(validate.rules).string = { min_len: 1, max_len: 128 }];
    }
  }
}

message UpdateLabelReply {
  LabelCatalogInfo label = 1;
}

message DeleteLabelRequest {
  int64 id = 1 [(validate.rules).int64 = { gt: 0 }];
}

message DeleteLabelReply {
}

message ConversationInfo {
  int64 id                                  = 1;
  model.v1.Platform platform                = 2;
  string fanpage_id                         = 3;
  string external_id                        = 4;
  string customer_name                      = 5;
  string fanpage_name                       = 6;
  google.protobuf.Timestamp last_message_at = 7;
  model.v1.Mode mode                        = 8;
  ConversationMessageInfo last_message      = 9;
  // At most 3 labels per conversation (enforced on AddConversationLabels).
  repeated LabelInfo labels = 10;
  // Count of messages with seen=false in this conversation.
  int64 unread_count = 11;
  // myid salesperson assigned to this thread; 0 = unassigned.
  int64 user_id                    = 12;
  model.v1.ConversationState state = 13;
  // URL for helpdesk customer avatar (partner profile or Messenger Graph).
  string avatar = 14;
}

message GetConversationRequest {
  int64 id = 1 [(validate.rules).int64 = { gt: 0 }];
}

message GetConversationReply {
  ConversationInfo conversation = 1;
}

// Assignee scope for ListConversations. MINE and OTHERS require x-user-id on the request.
enum ConversationOwnerFilter {
  CONVERSATION_OWNER_FILTER_UNSPECIFIED = 0;  // no assignee filter (same as ALL)
  CONVERSATION_OWNER_FILTER_ALL         = 1;
  CONVERSATION_OWNER_FILTER_MINE        = 2;  // conversation.user_id == caller
  CONVERSATION_OWNER_FILTER_OTHERS      = 3;  // user_id > 0 and user_id != caller
  CONVERSATION_OWNER_FILTER_UNASSIGNED  = 4;  // user_id == 0
}

message ListConversationsLabelsFilter {
  // AND filter: conversation must include every normalized title (case-insensitive).
  repeated string titles = 1 [(validate.rules).repeated = { max_items: 20,
                                                            items: { string: { ignore_empty: true, min_len: 1, max_len: 128 } } }];
}

message ListConversationsStatesFilter {
  // Help-desk state tab(s). Empty = all states within this filter (no-op if unset).
  repeated model.v1.ConversationState states = 1 [(validate.rules).repeated = { max_items: 4,
                                                                                items: { enum: { defined_only: true } } }];
}

message ListConversationsCustomerNameFilter {
  // Case-insensitive substring match on customer_name (SQL LIKE; % and _ in query are literal).
  string query = 1 [(validate.rules).string = { min_len: 1, max_len: 256 }];
}

// Inbox sort for ListConversations (uses denormalized last_message_at / unread_count on Conversation).
enum ListConversationsSort {
  LIST_CONVERSATIONS_SORT_UNSPECIFIED  = 0;  // newest first (same as NEWEST_FIRST)
  LIST_CONVERSATIONS_SORT_NEWEST_FIRST = 1;
  LIST_CONVERSATIONS_SORT_OLDEST_FIRST = 2;
  LIST_CONVERSATIONS_SORT_MOST_UNREAD  = 3;
}

message ListConversationsFilter {
  oneof criterion {
    ListConversationsLabelsFilter labels              = 1;
    ListConversationsStatesFilter states              = 2;
    ConversationOwnerFilter owner                     = 3 [(validate.rules).enum = { defined_only: true }];
    ListConversationsCustomerNameFilter customer_name = 4;
  }
}

message ListConversationsRequest {
  string fanpage_id                        = 1 [(validate.rules).string = { ignore_empty: true, max_len: 64 }];
  int32 page_size                          = 2;
  int32 page                               = 3;
  string integration_client_id             = 4 [(validate.rules).string = { ignore_empty: true, max_len: 64 }];
  repeated ListConversationsFilter filters = 5 [(validate.rules).repeated = { max_items: 4 }];
  ListConversationsSort sort               = 6 [(validate.rules).enum = { defined_only: true }];
  // When set (> 0), scope results to PLATFORM_TELEGRAM conversations for the given CS user.
  // fanpage_id and integration_client_id must be unset when this is used.
  int64 telegram_cs_user_id = 7 [(validate.rules).int64 = { gte: 0 }];
}

message ListConversationsReply {
  repeated ConversationInfo conversations = 1;
  int32 page_size                         = 2;
  int32 page                              = 3;
  // Total matching labels/states/customer_name/fanpage scope; owner filter is ignored (use for "All" badge and pagination denominator).
  int64 count            = 4;
  int64 mine_count       = 5;  // in scope (non-owner filters); user_id == caller
  int64 unassigned_count = 6;  // in scope (non-owner filters); user_id == 0
}

message ListPlatformsRequest {}

// One configured inbox source (page, integration, or Telegram CS account) for ListConversations scoping.
message PlatformInfo {
  model.v1.Platform platform = 1;
  // Scope id for ListConversations: fanpage_id (Facebook), integration_client_id (External),
  // or telegram_cs_user_id as decimal string (Telegram).
  string id   = 2 [(validate.rules).string = { min_len: 1, max_len: 64 }];
  string name = 3;
}

message ListPlatformsReply {
  repeated PlatformInfo platforms = 1;
}

message ConversationMessageInfo {
  int64 id                          = 1;
  int64 conversation_id             = 2;
  model.v1.Sender sender            = 3;
  model.v1.Method method            = 4;
  string content                    = 5;
  repeated string images            = 6;
  repeated string videos            = 7;
  repeated string audios            = 8;
  repeated string files             = 9;
  google.protobuf.Timestamp send_at = 10;
  // Staff read receipt on customer inbound rows (conversation_messages.seen).
  bool seen = 11;
  // Populated only when sender is SENDER_SALES.
  int64 sender_user_id                   = 12;
  string sender_username                 = 13;
  google.protobuf.Timestamp edited_at    = 14;
  google.protobuf.Timestamp deleted_at   = 15;
  string media_description               = 16;
  model.v1.MessageStatus delivery_status = 17;
  google.protobuf.Timestamp scheduled_at = 18;
  google.protobuf.Timestamp created_at   = 19;
  bool received                          = 20;
  // Staff delivery receipt time on customer inbound rows; set iff received is true.
  google.protobuf.Timestamp received_at = 21;
  bool seen_by_customer                 = 22;
  bool received_by_customer             = 23;
  // Staff read receipt time on customer inbound rows; set iff seen is true.
  google.protobuf.Timestamp seen_at = 24;
  // Partner read receipt time on outbound sales/bot rows; set iff seen_by_customer is true.
  google.protobuf.Timestamp seen_by_customer_at = 25;
  // Partner delivery receipt time on outbound sales/bot rows; set iff received_by_customer is true.
  google.protobuf.Timestamp received_by_customer_at = 26;
  // Set when delivery_status is FAILED (Telegram block, platform rejection, etc.).
  model.v1.DeliveryFailureReason failure_reason = 27;
  // Telegram CS voice notes (ogg/opus URLs); distinct from generic audios on partner threads.
  repeated string voices = 28;
  // Telegram CS stickers (static webp, animated tgs, or video webm URLs).
  repeated string stickers = 29;
  // Telegram CS GIFs (animation attachment URLs, typically mp4).
  repeated string gifs = 30;
  // 1Chat conversation_messages.id of the quoted parent; 0 when not a reply.
  int64 reply_to_message_id = 31;
  // Shallow parent preview (one level); omitted when parent row is missing.
  ConversationMessageInfo reply_to = 32;
  // Excerpt from the parent message when the reply quotes a substring; empty when not a quote-reply.
  string reply_quote_text = 33 [(validate.rules).string = { max_len: 4096 }];
  // UTF-16 code-unit offset of reply_quote_text within the parent message content; 0 when not set.
  int32 reply_quote_position = 34 [(validate.rules).int32 = { gte: 0 }];
}

message SeenRequest {
  int64 conversation_id      = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated int64 message_ids = 2 [(validate.rules).repeated = { max_items: 200, unique: true,
                                                                items: { int64: { gte: 1 } } }];
}

message SeenReply {
  // Denormalized unread_count after sync (read from writer); use to refresh inbox without waiting on replica.
  int64 unread_count = 1;
}

message UnseenRequest {
  int64 conversation_id      = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated int64 message_ids = 2 [(validate.rules).repeated = { max_items: 200, unique: true,
                                                                items: { int64: { gte: 1 } } }];
}

message UnseenReply {
  int64 unread_count = 1;
}

message ReceivedRequest {
  repeated int64 message_ids = 1 [(validate.rules).repeated = { min_items: 1, max_items: 200, unique: true,
                                                                items: { int64: { gte: 1 } } }];
}

message ReceivedReply {
  // Number of customer messages newly flipped to received.
  int64 updated_count = 1;
}

message ListUnreceivedMessagesRequest {
  int32 page_size = 1;
  // Message-id cursor (newest first); omit for the first page. Pass the smallest id from the prior page.
  int64 before_message_id = 2 [(validate.rules).int64 = { gte: 0 }];
  // Omit or UNSPECIFIED = all platforms in the tenant inbox.
  model.v1.Platform platform = 3 [(validate.rules).enum = { defined_only: true }];
}

message ListUnreceivedMessagesReply {
  repeated ConversationMessageInfo messages = 1;
  int32 page_size                           = 2;
  // True when more unreceived rows exist older than the last item in messages.
  bool has_next = 3;
}

message GetConversationMessagesRequest {
  int64 conversation_id = 1 [(validate.rules).int64 = { gt: 0 }];
  int32 page_size       = 2;
  int64 before_id       = 3;
}

message GetConversationMessagesReply {
  repeated ConversationMessageInfo messages = 1;
  int32 page_size                           = 2;
}

enum SearchMessagesSort {
  SEARCH_MESSAGES_SORT_UNSPECIFIED  = 0;  // FULLTEXT relevance (default)
  SEARCH_MESSAGES_SORT_NEWEST_FIRST = 1;
  SEARCH_MESSAGES_SORT_OLDEST_FIRST = 2;
}

message SearchMessagesRequest {
  // Plain-text query. Results are ordered by matching customer_name first (latest
  // message per conversation), then matching message content (FULLTEXT/LIKE).
  // Pagination spans both blocks in that order. Boolean operators are stripped for content.
  string query            = 1 [(validate.rules).string = { min_len: 1, max_len: 256 }];
  int32 page_size         = 2;
  int32 page              = 3;
  SearchMessagesSort sort = 4 [(validate.rules).enum = { defined_only: true }];
}

message SearchMessageHit {
  ConversationMessageInfo message = 1;
  string customer_name            = 2;
  string fanpage_id               = 3;
  model.v1.Platform platform      = 4;
  // Help-desk state of the parent conversation thread containing `message`.
  model.v1.ConversationState state = 5;
  // Partner-side customer id (Messenger PSID, integration external_id, etc.).
  string external_id = 6;
}

message SearchMessagesReply {
  // Result rows for this page. len(hits) may be less than page_size (e.g. name/content
  // dedupe on a mixed page). Clients must use has_next to decide whether another page
  // exists; do not infer end-of-results from len(hits) == page_size.
  repeated SearchMessageHit hits = 1;
  int32 page_size                = 2;
  int32 page                     = 3;
  // True when more hits exist beyond this page (name block, content block, or both).
  bool has_next = 4;
}

// One row in the mixed chat timeline (newest-first pages).
message ConversationTimelineItem {
  oneof item {
    ConversationMessageInfo message          = 1;
    ConversationUpdateEventInfo update_event = 2;
    PrivateNote private_note                 = 3;
  }
}

message ConversationUpdateEventInfo {
  int64 id                             = 1;
  int64 conversation_id                = 2;
  int64 actor_user_id                  = 3;
  google.protobuf.Timestamp created_at = 4;
  oneof change {
    StateChange state    = 10;
    ModeChange mode      = 11;
    UserIdChange user_id = 12;
    LabelChange label    = 13;
  }
  message StateChange {
    model.v1.ConversationState old_state = 1;
    model.v1.ConversationState new_state = 2;
  }
  message ModeChange {
    model.v1.Mode old_mode = 1;
    model.v1.Mode new_mode = 2;
  }
  message UserIdChange {
    int64 old_user_id = 1;
    int64 new_user_id = 2;
  }
  message LabelChange {
    model.v1.LabelOp operator = 1;
    string label = 2;  // normalized label title
  }
}

message ListMessagesRequest {
  int64 conversation_id = 1 [(validate.rules).int64 = { gt: 0 }];
  int32 message_size    = 2;
  // Message-id cursor (same as GetConversationMessages before_id); omit for the newest page.
  // Update events and private notes are loaded by send_at window, not message id: the first page has
  // no upper time bound; later pages use before_message_id's message send_at as an exclusive upper
  // bound so nothing falls between pages.
  int64 before_message_id = 3;
}

message ListMessagesReply {
  repeated ConversationTimelineItem items = 1;
  int32 message_size                      = 2;
}

message PrivateNote {
  int64 id                             = 1;
  int64 conversation_id                = 2;
  int64 user_id                        = 3;
  string content                       = 4 [(validate.rules).string = { min_len: 0, max_len: 4096 }];
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message ListPrivateNotesRequest {
  int64 conversation_id = 1 [(validate.rules).int64 = { gt: 0 }];
  int32 page_size       = 2;
  int64 before_id       = 3;
}

message ListPrivateNotesReply {
  repeated PrivateNote notes = 1;
  int32 page_size            = 2;
  int64 count                = 3;
}

message CreatePrivateNoteRequest {
  int64 conversation_id = 1 [(validate.rules).int64 = { gt: 0 }];
  string content        = 2 [(validate.rules).string = { min_len: 1, max_len: 4096 }];
}

message CreatePrivateNoteReply {
  PrivateNote note = 1;
}

message UpdatePrivateNoteRequest {
  int64 id                = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated Change changes = 2;

  message Change {
    oneof field {
      string content = 1 [(validate.rules).string = { min_len: 1, max_len: 4096 }];
    }
  }
}

message UpdatePrivateNoteReply {
  PrivateNote note = 1;
}

message DeletePrivateNotesRequest {
  int64 conversation_id = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated int64 ids    = 2 [(validate.rules).repeated = { min_items: 1, max_items: 50, unique: true,
                                                           items: { int64: { gte: 1 } } }];
}

message DeletePrivateNotesReply {
  int64 deleted_count = 1;
}

// ── Help-desk live stream ──

message StreamMessagesRequest {
  int64 resume_after_message_id       = 1;
  int64 resume_after_ai_suggestion_id = 2;
  int64 resume_after_update_event_id  = 3;
}

message SendMessageRequest {
  // Existing thread id from ListConversations etc. Use 0 to start (or continue) a thread identified by
  // integration_client_id + external_id; the server creates the Conversation row if needed.
  int64 conversation_id  = 1 [(validate.rules).int64 = { gte: 0 }];
  string content         = 2 [(validate.rules).string = { max_len: 4096 }];
  repeated string images = 3 [(validate.rules).repeated = { max_items: 10,
                                                            items: { string: { max_len: 2048 } } }];
  repeated string videos = 4 [(validate.rules).repeated = { max_items: 10,
                                                            items: { string: { max_len: 2048 } } }];
  string idempotency_key = 5 [(validate.rules).string = { min_len: 1, max_len: 128 }];
  // Required when conversation_id is 0: partner-side customer id (same as Conversation.external_id).
  string external_id = 6 [(validate.rules).string = { max_len: 64 }];
  // Required when conversation_id is 0: Integration.client_id for this tenant (same as Conversation.fanpage_id).
  string integration_client_id = 7 [(validate.rules).string = { max_len: 64 }];
  // Optional display name for the customer when the conversation row is first created.
  string external_name = 8 [(validate.rules).string = { max_len: 256 }];
  // Optional future send time (Unix ms UTC). 0 or omitted = send immediately.
  int64 scheduled_at_unix_ms = 9;
  // Optional quote-reply to an existing message in the same conversation (1Chat id).
  int64 reply_to_message_id = 10 [(validate.rules).int64 = { gte: 0 }];
  // Optional excerpt from the parent message; requires reply_to_message_id when set.
  string reply_quote_text = 11 [(validate.rules).string = { max_len: 4096 }];
  // UTF-16 code-unit offset of reply_quote_text within the parent message content.
  int32 reply_quote_position = 12 [(validate.rules).int32 = { gte: 0 }];
  repeated string files      = 13 [(validate.rules).repeated = { max_items: 10,
                                                                 items: { string: { max_len: 2048 } } }];
}

message SendMessageReply {
  int64 message_id      = 1;
  int64 send_at_unix_ms = 2;
  bool duplicate        = 3;
  // Always the conversation this message belongs to (useful when the request used conversation_id = 0).
  int64 conversation_id = 4;
  // True when this request newly assigned the thread to the caller (conversation was unassigned).
  bool assigned = 5;
  // True when the message was stored as pending for future delivery.
  bool scheduled = 6;
}

message UpdateMessageRequest {
  int64 message_id       = 1 [(validate.rules).int64 = { gt: 0 }];
  string content         = 2 [(validate.rules).string = { max_len: 4096 }];
  repeated string images = 3 [(validate.rules).repeated = { max_items: 10,
                                                            items: { string: { max_len: 2048 } } }];
  repeated string videos = 4 [(validate.rules).repeated = { max_items: 10,
                                                            items: { string: { max_len: 2048 } } }];
  // Reschedule a pending message (Unix ms UTC). Only valid when delivery_status is PENDING.
  int64 scheduled_at_unix_ms = 5;
}

message UpdateMessageReply {
  int64 message_id        = 1;
  int64 edited_at_unix_ms = 2;
}

message DeleteMessageRequest {
  int64 message_id = 1 [(validate.rules).int64 = { gt: 0 }];
}

message DeleteMessageReply {
  int64 message_id         = 1;
  int64 deleted_at_unix_ms = 2;
}

message AiReplySuggestionInfo {
  int64 id                       = 1;
  string tenant_id               = 2;
  int64 conversation_id          = 3;
  int64 trigger_message_id       = 4;
  string trigger_message_content = 5;
  string suggested_reply         = 6;
  repeated string images         = 7;
  repeated string videos         = 8;
  reserved 9;
  reserved "kb_citations", "confidence", "needs_human";
  string model_used                    = 10;
  google.protobuf.Timestamp created_at = 11;
  string context_summary               = 12;
  string context_recent                = 13;
  string context_kb                    = 14;
  string payload_json                  = 15;
  model.v1.Platform platform           = 16;
}

message HelpdeskAiSuggestionEvent {
  AiReplySuggestionInfo suggestion = 1;
  AiSuggestionStatus status        = 2;
}

enum AiSuggestionStatus {
  AI_SUGGESTION_STATUS_UNSPECIFIED = 0;
  AI_SUGGESTION_STATUS_PENDING     = 1;
  AI_SUGGESTION_STATUS_FAILED      = 2;
  AI_SUGGESTION_STATUS_COMPLETED   = 3;
}

message ListAiReplySuggestionsRequest {
  int64 conversation_id = 1 [(validate.rules).int64 = { gt: 0 }];
  int32 page_size       = 2;
  int64 before_id       = 3;
}

message ListAiReplySuggestionsReply {
  repeated AiReplySuggestionInfo suggestions = 1;
  int32 page_size                            = 2;
  int64 count                                = 3;
}

// Keepalive for StreamMessages; ignored by clients except to hold the connection open.
message HelpdeskStreamPing {
  int64 server_time_unix_ms = 1;
}

// Ephemeral live-only event when an external partner marks outbound messages as seen by the end customer.
message HelpdeskCustomerSeenEvent {
  int64 conversation_id      = 1;
  repeated int64 message_ids = 2;
  bool seen                  = 3;
  int64 seen_at_unix_ms      = 4;
}

// Ephemeral live-only event when a CS staff marks customer messages seen/unseen, so other operators
// (and the same operator's other devices) sync read-state and unread badge without refetching.
message HelpdeskStaffSeenEvent {
  int64 conversation_id      = 1;
  repeated int64 message_ids = 2;
  int64 staff_user_id        = 3;
  bool seen                  = 4;  // true = Seen, false = Unseen
  int64 seen_at_unix_ms      = 5;
  int64 unread_count         = 6;  // denormalized unread after sync
}

// Ephemeral live-only event when an external partner marks outbound messages received (delivered) by the
// end customer, so staff clients update the delivery tick without refetching.
message HelpdeskCustomerReceivedEvent {
  int64 conversation_id      = 1;
  repeated int64 message_ids = 2;
  bool received              = 3;
  int64 received_at_unix_ms  = 4;
}

// Ephemeral live-only event when a CS staff marks customer messages received, so other operators
// (and the same operator's other devices) sync the delivery tick without refetching.
message HelpdeskStaffReceivedEvent {
  int64 conversation_id      = 1;
  repeated int64 message_ids = 2;
  int64 staff_user_id        = 3;
  int64 received_at_unix_ms  = 4;
}

message HelpdeskStreamEvent {
  oneof item {
    HelpdeskStreamPing ping                         = 1;
    HelpdeskAiSuggestionEvent ai_suggestion         = 2;
    ConversationMessageInfo chat_message            = 3;
    ConversationUpdateEventInfo update_event        = 4;
    HelpdeskCustomerSeenEvent customer_seen         = 5;
    HelpdeskStaffSeenEvent staff_seen               = 6;
    HelpdeskCustomerReceivedEvent customer_received = 7;
    HelpdeskStaffReceivedEvent staff_received       = 8;
  }
}

// ── Scheduled Messages ──

// One delivery line for a scheduled job (per recipient).
message ScheduledDeliveryInfo {
  int64 id                                         = 1;
  int64 recipient_id                               = 2;  // 0 = snapshot-only (e.g. legacy backfill), optional in API via zero
  string snapshot_name                             = 3;
  string snapshot_platform_id                      = 4;
  model.v1.ScheduledDeliveryStatus delivery_status = 5;
  string error_message                             = 6;
  google.protobuf.Timestamp sent_at                = 7;
  string snapshot_picture_url                      = 8 [(validate.rules).string = { ignore_empty: true, max_len: 2048 }];
  model.v1.DeliveryFailureReason failure_reason    = 9;
  int32 platform_error_code                        = 10;
}

message ScheduledMessageInfo {
  int64 id                                  = 1;
  string content                            = 2;
  google.protobuf.Timestamp scheduled_at    = 6;
  model.v1.ScheduledMessageStatus status    = 7;
  model.v1.RepeatType repeat                = 8;
  string error_message                      = 9;
  google.protobuf.Timestamp sent_at         = 10;
  google.protobuf.Timestamp created_at      = 11;
  google.protobuf.Timestamp updated_at      = 12;
  repeated ScheduledDeliveryInfo deliveries = 13;
  repeated string images                    = 14;
  repeated string videos                    = 15;
  model.v1.Platform platform                = 16;
}

message CreateScheduledMessageRequest {
  string content                         = 1 [(validate.rules).string = { min_len: 1, max_len: 4096 }];
  google.protobuf.Timestamp scheduled_at = 2 [(validate.rules).timestamp = { required: true }];
  model.v1.RepeatType repeat             = 3;
  repeated int64 recipient_ids           = 4 [(validate.rules).repeated = { min_items: 1, max_items: 50, unique: true,
                                                                            items: { int64: { gte: 1 } } }];
  repeated string images                 = 5 [(validate.rules).repeated = { max_items: 10,
                                                                            items: { string: { max_len: 2048 } } }];
  repeated string videos                 = 6 [(validate.rules).repeated = { max_items: 10,
                                                                            items: { string: { max_len: 2048 } } }];
}

message CreateScheduledMessageReply {
  ScheduledMessageInfo message = 1;
}

message ListScheduledMessagesRequest {
  int32 page_size                               = 1;
  int32 page                                    = 2;
  model.v1.ScheduledMessageStatus status_filter = 3;  // 0 = all
  // Case-insensitive match on message body and/or recipient name/platform_id in recipient_ids.
  string search_query = 4 [(validate.rules).string = { max_len: 256, ignore_empty: true }];
}

message ListScheduledMessagesReply {
  repeated ScheduledMessageInfo messages = 1;
  int32 page_size                        = 2;
  int32 page                             = 3;
  int64 count                            = 4;
}

message GetScheduledMessageRequest {
  int64 id = 1 [(validate.rules).int64 = { gt: 0 }];
}

message GetScheduledMessageReply {
  ScheduledMessageInfo message = 1;
}

message UpdateScheduledMessageRequest {
  int64 id                = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated Change changes = 2;

  message Change {
    oneof field {
      string content                         = 1;
      google.protobuf.Timestamp scheduled_at = 2;
      model.v1.RepeatType repeat             = 3;
      model.v1.ScheduledMessageStatus status = 4;
    }
  }
}

message UpdateScheduledMessageReply {}

message DeleteScheduledMessageRequest {
  int64 id = 1 [(validate.rules).int64 = { gt: 0 }];
}

message DeleteScheduledMessageReply {}

// ---- Recipients (tenant address book) ----

message RecipientInfo {
  int64 id                             = 1;
  string name                          = 2 [(validate.rules).string = { min_len: 0, max_len: 512 }];
  string platform_id                   = 3 [(validate.rules).string = { min_len: 1, max_len: 256 }];
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  // Messenger profile photo URL when known (Graph + page token).
  string picture_url         = 6 [(validate.rules).string = { ignore_empty: true, max_len: 2048 }];
  model.v1.Platform platform = 7;
  // Required when platform is EXTERNAL: Integration.client_id for this tenant.
  // Required when platform is TELEGRAM: cs_user_id (decimal string, same as Conversation.fanpage_id).
  string integration_client_id = 8 [(validate.rules).string = { ignore_empty: true, max_len: 64 }];
}

message ListRecipientsRequest {
  int32 page_size = 1;
  int32 page      = 2;
}

message ListRecipientsReply {
  repeated RecipientInfo recipients = 1;
  int32 page_size                   = 2;
  int32 page                        = 3;
  int64 count                       = 4;
}

message CreateRecipientRequest {
  // Single-recipient mode when `items` is empty: these fields are required (platform_id non-empty).
  string name        = 1 [(validate.rules).string = { min_len: 0, max_len: 512 }];
  string platform_id = 2 [(validate.rules).string = { max_len: 256 }];
  // Explicit URL from client — when empty, backend may fetch via Messenger Graph API.
  string picture_url = 3 [(validate.rules).string = { ignore_empty: true, max_len: 2048 }];
  // Facebook page id hints which page token to try first when resolving avatar (PSIDs are page-scoped).
  string facebook_page_id = 4 [(validate.rules).string = { ignore_empty: true, max_len: 64 }];
  // Multi-recipient mode: 1–50 entries in one RPC; order matches `CreateRecipientReply.recipients`.
  // When set (non-empty), top-level name/platform_id/picture_url/facebook_page_id are ignored.
  repeated Item items        = 5 [(validate.rules).repeated = { max_items: 50 }];
  model.v1.Platform platform = 6;
  // Required when platform is EXTERNAL.
  string integration_client_id = 7 [(validate.rules).string = { ignore_empty: true, max_len: 64 }];
  message Item {
    string name                  = 1 [(validate.rules).string = { min_len: 0, max_len: 512 }];
    string platform_id           = 2 [(validate.rules).string = { min_len: 1, max_len: 256 }];
    string picture_url           = 3 [(validate.rules).string = { ignore_empty: true, max_len: 2048 }];
    string facebook_page_id      = 4 [(validate.rules).string = { ignore_empty: true, max_len: 64 }];
    model.v1.Platform platform   = 5;
    string integration_client_id = 6 [(validate.rules).string = { ignore_empty: true, max_len: 64 }];
  }
}

message CreateRecipientReply {
  // Single mode: set. Multi mode: same as recipients[0] for convenience (optional).
  RecipientInfo recipient = 1;
  // Multi mode: same order as request.items; empty in single mode.
  repeated RecipientInfo recipients = 2;
}

message UpdateRecipientRequest {
  int64 id                = 1 [(validate.rules).int64 = { gt: 0 }];
  repeated Change changes = 2;

  message Change {
    oneof field {
      string name        = 1;
      string platform_id = 2;
      string picture_url = 3;
    }
  }
}

message UpdateRecipientReply {}

message DeleteRecipientRequest {
  int64 id = 1 [(validate.rules).int64 = { gt: 0 }];
}

message DeleteRecipientReply {}

