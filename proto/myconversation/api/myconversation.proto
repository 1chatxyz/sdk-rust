message ListChatGroupMessagesRequest {
  int64 group_id  = 1 [(validate.rules).int64 = { gt: 0 }];
  int32 page_size = 2;
  // Omit or 0 = main channel; > 0 = topic thread.
  int64 topic_id = 4 [(validate.rules).int64 = { gte: 0 }];
  // Pagination cursors — mutually exclusive; omit all for the newest page.
  // before_message_id: exclusive upper bound (id < cursor), older messages.
  int64 before_message_id = 3;
  // after_message_id: exclusive lower bound (id > cursor), newer messages.
  int64 after_message_id = 5;
  // around_message_id: inclusive anchor for search/mention jump; page_size is total window.
  int64 around_message_id = 6;
  // Omit or 0: top-level messages only (exclude thread replies). >0: list replies in that thread.
  int64 message_thread_root_id = 7 [(validate.rules).int64 = { gte: 0 }];
}

message ListChatGroupMessagesReply {
  repeated ChatGroupMessageInfo messages = 1 [deprecated = true];
  int32 page_size                        = 2 [deprecated = true];
  // True when more messages exist below min(returned.id).
  bool has_older = 3;
  // True when more messages exist above max(returned.id).
  bool has_newer = 4;
  // Mixed timeline (oldest-first within each page). Replayable ChatGroupStreamEvent variants
  // only: message, member_change, meta_change, topic_change, pinned_change. Live-only payloads
  // (ping, typing, read/received/reaction_change) never appear here.
  repeated ChatGroupStreamEvent items = 5;
}

message MarkChatGroupReadRequest {
  int64 group_id             = 1 [(validate.rules).int64 = { gt: 0 }];
