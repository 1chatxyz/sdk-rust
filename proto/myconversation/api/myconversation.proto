message ChatGroupMessageInfo {
  int64 id                             = 1;
  int64 group_id                       = 2;
  int64 sender_user_id                 = 3;
  string sender_username               = 4;
  string content                       = 5;
  repeated string images               = 6;
  repeated string videos               = 7;
  repeated string files                = 8;
  repeated int64 mentioned_user_ids    = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp edited_at  = 11;
  google.protobuf.Timestamp deleted_at = 12;
  // 0 = main channel; > 0 = topic thread.
  int64 topic_id = 13;
  // Per-member delivery ACKs (receipt = xác nhận đã nhận/đã đọc, not biên lai thanh toán).
  // Active anonymous members never appear in these lists/counts for any viewer (owner/admin included).
  // Anonymous members still ACK via MarkChatGroupRead / MarkChatGroupReceived; unread clears via RPC reply.
  int64 received_count                    = 14;
  int64 read_count                        = 15;
  repeated int64 received_by_user_ids     = 16;
  repeated int64 read_by_user_ids         = 17;
  ChatGroupDeliveryStatus delivery_status = 18;
  ChatGroupMessageInfo reply_to           = 19;
  // 0 = top-level; on thread replies, the parent message id.
  int64 message_thread_root_id = 20;
  // Set on top-level messages when reply_count > 0.
  MessageThreadSummary message_thread = 21;
  // Resolved from mysticker at send time so the UI can render without an extra call.
  // sticker_url may be empty if lookup failed; sticker_id is always preserved when set.
  int64 sticker_id                    = 22;
  string sticker_url                  = 23 [(validate.rules).string = { ignore_empty: true, max_len: 2048 }];
  repeated MessageReaction reactions  = 24;
  repeated LinkPreview link_previews  = 25;
  bool pinned                         = 26;
  google.protobuf.Timestamp pinned_at = 27;
  int64 pinned_by_user_id             = 28;
  // Set when this message forwards a shared snapshot (see ShareMessage / GetSharedMessage).
  string shared_message_hash = 29 [(validate.rules).string = { ignore_empty: true, min_len: 1, max_len: 64 }];
  // Excerpt from the parent message when the reply quotes a substring; empty when not a quote-reply.
  string reply_quote_text = 30 [(validate.rules).string = { max_len: 4096 }];
  // UTF-16 code-unit offset of reply_quote_text within the parent message content; 0 when not set.
  int32 reply_quote_position = 31 [(validate.rules).int32 = { gte: 0 }];
  // Original name/size per uploaded file (matched to `files` by URL).
  repeated FileMeta file_metas = 32;
  // True when the sender targeted @all (active members at send/edit time).
  // When true, mentioned_user_ids is omitted on the wire; clients render @all from this flag.
  bool mentions_all = 33;
  // Snapshot at send time. When true, wire hydrate always sets sender_user_id=0 and
  // sender_username to the group name (main) or topic name (thread); nobody (including
  // owner/admin/self) sees the real author on the wire.
  bool sender_anonymous = 34;
}

